name: Release

# Tag a version (vX.Y.Z) and this builds the wheel + sdist, verifies they are
# PyPI-acceptable, attaches them (with sha256 checksums) to the GitHub release,
# and publishes to PyPI via Trusted Publishing (OIDC — no API token secret).
#
# One-time PyPI setup (cannot be automated):
#   https://pypi.org/manage/account/publishing/  → add a "pending publisher":
#     PyPI project name: pre-flight-check
#     Owner:             mirekondro
#     Repository:        The-Pre-Flight-Check
#     Workflow name:     release.yml
#     Environment:       pypi
#
# After that, `git tag vX.Y.Z && git push origin vX.Y.Z` ships every channel.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build and publish, e.g. v1.2.0"
        required: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build the distributions once and verify PyPI will accept them.
  # ---------------------------------------------------------------------------
  build:
    name: Build + verify distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install --quiet build twine

      - name: Build wheel + sdist
        run: python -m build --wheel --sdist --outdir dist

      - name: Verify distributions are PyPI-acceptable
        run: python -m twine check dist/*

      - name: Generate sha256 checksums
        run: |
          cd dist
          for f in *; do sha256sum "$f" | awk '{print $1}' > "$f.sha256"; done
          ls -la

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Attach the built artifacts (+ checksums) to the GitHub release.
  # ---------------------------------------------------------------------------
  github-release:
    name: Attach artifacts to GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create or update the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*

  # ---------------------------------------------------------------------------
  # Publish to PyPI via Trusted Publishing. No secret — OIDC proves identity.
  # The `pypi` environment must match the pending publisher configured on PyPI.
  # ---------------------------------------------------------------------------
  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pre-flight-check
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Drop checksum files (PyPI rejects non-distribution files)
        run: rm -f dist/*.sha256

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Re-runs (e.g. to verify the tap sync) won't fail when a version is
          # already on PyPI — duplicate files are skipped instead of erroring.
          skip-existing: true

  # ---------------------------------------------------------------------------
  # Bump the Homebrew formula + Scoop bucket to the new version/checksums and
  # open a PR against main. Closes the last manual step in the release.
  #
  # Requires repo setting: Settings → Actions → General →
  #   "Allow GitHub Actions to create and approve pull requests" = ON.
  # ---------------------------------------------------------------------------
  bump-manifests:
    name: Bump Homebrew + Scoop manifests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Compute version + checksums
        id: vars
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          # Wheel sha256 was emitted alongside the artifact in the build job.
          WHEEL_SHA="$(cat "dist/pre_flight_check-${VERSION}-py3-none-any.whl.sha256")"
          # Homebrew installs from the auto-generated source tarball for the tag.
          SRC_SHA="$(curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz" | sha256sum | awk '{print $1}')"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "wheel_sha=$WHEEL_SHA"
            echo "src_sha=$SRC_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Patch Formula + bucket
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.vars.outputs.tag }}
          VERSION: ${{ steps.vars.outputs.version }}
          SRC_SHA: ${{ steps.vars.outputs.src_sha }}
          WHEEL_SHA: ${{ steps.vars.outputs.wheel_sha }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib, re

          repo      = os.environ["REPO"]
          tag       = os.environ["TAG"]
          version   = os.environ["VERSION"]
          src_sha   = os.environ["SRC_SHA"]
          wheel_sha = os.environ["WHEEL_SHA"]

          rb = pathlib.Path("Formula/pre-flight-check.rb")
          s = rb.read_text()
          s = re.sub(
              r'url "https://github\.com/[^"]+/archive/refs/tags/v[\d.]+\.tar\.gz"',
              f'url "https://github.com/{repo}/archive/refs/tags/{tag}.tar.gz"', s)
          s = re.sub(r'sha256 "[0-9a-f]{64}"', f'sha256 "{src_sha}"', s)
          rb.write_text(s)

          bj = pathlib.Path("bucket/pre-flight-check.json")
          d = json.loads(bj.read_text())
          d["version"] = version
          d["url"] = (f"https://github.com/{repo}/releases/download/{tag}/"
                      f"pre_flight_check-{version}-py3-none-any.whl#/dl.whl")
          d["hash"] = f"sha256:{wheel_sha}"
          bj.write_text(json.dumps(d, indent=4, ensure_ascii=False) + "\n")
          PY
          echo "--- Formula diff ---"; git diff -- Formula/pre-flight-check.rb || true
          echo "--- bucket diff ---";  git diff -- bucket/pre-flight-check.json || true

      # Push the patched formula straight to the Homebrew tap repo so
      # `brew install` serves the new version immediately. Skipped (not failed)
      # when TAP_TOKEN is absent. TAP_TOKEN must be a PAT with contents:write
      # on mirekondro/homebrew-pre-flight-check, saved as a repo secret.
      - name: Sync formula to Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_TOKEN not set — skipping tap sync."
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/mirekondro/homebrew-pre-flight-check.git" /tmp/tap
          cp Formula/pre-flight-check.rb /tmp/tap/Formula/pre-flight-check.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/pre-flight-check.rb
          if git diff --cached --quiet; then
            echo "Tap formula already up to date."
          else
            git commit -m "chore: sync formula to ${TAG}"
            git push
          fi

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: bump-manifests-${{ steps.vars.outputs.tag }}
          title: "chore(release): bump Homebrew + Scoop to ${{ steps.vars.outputs.tag }}"
          body: |
            Automated manifest bump for **${{ steps.vars.outputs.tag }}**.

            - Homebrew `url` → `${{ steps.vars.outputs.tag }}` source tarball
            - Homebrew `sha256` → `${{ steps.vars.outputs.src_sha }}`
            - Scoop `version` → `${{ steps.vars.outputs.version }}`
            - Scoop wheel `hash` → `sha256:${{ steps.vars.outputs.wheel_sha }}`

            Generated by `.github/workflows/release.yml`.
          commit-message: "chore(release): bump Homebrew + Scoop to ${{ steps.vars.outputs.tag }}"
          delete-branch: true
