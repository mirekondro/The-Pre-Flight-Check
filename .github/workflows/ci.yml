name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint the pipeline engine itself. The skill must be ≥3.8 compatible.
  # ---------------------------------------------------------------------------
  python-lint:
    name: Python lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.8 (minimum supported)
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install lint tools
        run: pip install --quiet "ruff==0.6.*" "mypy==1.11.*"

      - name: Compile check
        run: python -c "import py_compile; py_compile.compile('skills/pre-flight-check/scripts/run-pipeline.py', doraise=True)"

      - name: ruff
        run: ruff check skills/pre-flight-check/scripts/run-pipeline.py

      - name: mypy
        run: mypy --strict --python-version 3.8 skills/pre-flight-check/scripts/run-pipeline.py

  # ---------------------------------------------------------------------------
  # Lint the pre_flight_check Python package (the pipx-installable wrapper).
  # Package requires Python ≥3.9 because it uses importlib.resources.files().
  # ---------------------------------------------------------------------------
  package-lint:
    name: Package lint (ruff + mypy on src/pre_flight_check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install lint tools
        run: pip install --quiet "ruff==0.6.*" "mypy==1.11.*"
      - name: ruff
        run: ruff check src/pre_flight_check/
      - name: mypy
        run: mypy --strict --python-version 3.9 src/pre_flight_check/

  # ---------------------------------------------------------------------------
  # Build the wheel, install it, and round-trip the CLI in a temp project.
  # ---------------------------------------------------------------------------
  package-smoke:
    name: Package build + pipx round-trip (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: pip install --quiet build
      - name: Build wheel + sdist
        run: python -m build --wheel --sdist --outdir dist
      - name: Install the wheel
        shell: bash
        run: pip install dist/*.whl
      - name: pre-flight-check --version
        run: pre-flight-check --version
      - name: pre-flight-check list-tools
        run: pre-flight-check list-tools
      - name: init --tool all into temp dir
        shell: bash
        run: |
          TMP=$(mktemp -d)
          cd "$TMP"
          pre-flight-check init --tool all --project --force
          test -f .claude/skills/pre-flight-check/SKILL.md
          test -f AGENTS.md
          test -f .cursor/rules/pre-flight-check.mdc
          echo "TMP=$TMP" >> "$GITHUB_ENV"
      - name: uninstall --tool all + verify clean
        shell: bash
        run: |
          cd "$TMP"
          pre-flight-check uninstall --tool all --project
          remaining=$(find "$TMP" -mindepth 1 -type f | wc -l | tr -d ' ')
          if [ "$remaining" != "0" ]; then
            echo "::error::$remaining file(s) left after uninstall"
            find "$TMP" -mindepth 1 -type f
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # ShellCheck for installers.
  # ---------------------------------------------------------------------------
  shellcheck:
    name: ShellCheck installers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint install.sh
        run: shellcheck -s bash install.sh

      - name: Lint uninstall.sh
        run: shellcheck -s bash uninstall.sh

  # ---------------------------------------------------------------------------
  # PowerShell static analysis for install.ps1.
  # ---------------------------------------------------------------------------
  powershell-lint:
    name: PSScriptAnalyzer (install.ps1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Analyze install.ps1
        shell: pwsh
        # Fail only on Errors; print Warnings without failing. Several PS
        # warnings are false-positives or stylistic for an installer script:
        #   - PSAvoidUsingWriteHost: we DO need colored console output
        #   - PSUseApprovedVerbs: Throw-Die is a private helper, not a cmdlet
        #   - PSReviewUnusedParameter: -Force IS used via $Force checks
        #   - PSUseSingularNouns: Get-AdapterPaths really does return many
        #   - PSUseBOMForUnicodeEncodedFile: UTF-8 without BOM is standard
        run: |
          $warnings = Invoke-ScriptAnalyzer -Path install.ps1 -Severity Warning
          if ($warnings) { $warnings | Format-Table -AutoSize }
          $errors = Invoke-ScriptAnalyzer -Path install.ps1 -Severity Error
          if ($errors) {
            $errors | Format-Table -AutoSize
            throw "PSScriptAnalyzer reported $($errors.Count) ERROR(s)."
          } else {
            Write-Output "PSScriptAnalyzer: no errors."
          }

  # ---------------------------------------------------------------------------
  # node-broken fixture must exit 1 with stage TYPECHECK.
  # ---------------------------------------------------------------------------
  fixture-node-broken:
    name: Fixture — node-broken (expect exit 1, stage TYPECHECK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install fixture dependencies
        working-directory: examples/node-broken
        run: npm install --no-audit --no-fund

      - name: Run pipeline against fixture
        id: run
        working-directory: examples/node-broken
        run: |
          set +e
          out="$(python3 ../../skills/pre-flight-check/scripts/run-pipeline.py 2>&1)"
          rc=$?
          set -e
          echo "$out"
          echo "---"
          echo "exit: $rc"

          # Persist for the assert step
          {
            echo "rc=$rc"
            echo "out<<__EOF__"
            echo "$out"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Assert exit code 1
        if: steps.run.outputs.rc != '1'
        run: |
          echo "::error::Expected exit 1, got ${{ steps.run.outputs.rc }}"
          exit 1

      - name: Assert TYPECHECK failure block
        env:
          OUTPUT: ${{ steps.run.outputs.out }}
        run: |
          if ! echo "$OUTPUT" | grep -q '### ❌ PRE-FLIGHT FAILURE: TYPECHECK'; then
            echo "::error::Output missing TYPECHECK failure block"
            exit 1
          fi
          echo "OK: TYPECHECK failure block present."

  # ---------------------------------------------------------------------------
  # python-broken fixture must exit 1 with stage TYPECHECK.
  # ---------------------------------------------------------------------------
  fixture-python-broken:
    name: Fixture — python-broken (expect exit 1, stage TYPECHECK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fixture dev tooling
        working-directory: examples/python-broken
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet -e ".[dev]"

      - name: Run pipeline against fixture
        id: run
        working-directory: examples/python-broken
        run: |
          # The pipeline uses shutil.which() against PATH — prepend venv bin
          # so mypy is visible without sourcing activate.
          export PATH="$PWD/.venv/bin:$PATH"
          set +e
          out="$(python3 ../../skills/pre-flight-check/scripts/run-pipeline.py 2>&1)"
          rc=$?
          set -e
          echo "$out"
          echo "---"
          echo "exit: $rc"

          {
            echo "rc=$rc"
            echo "out<<__EOF__"
            echo "$out"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Assert exit code 1
        if: steps.run.outputs.rc != '1'
        run: |
          echo "::error::Expected exit 1, got ${{ steps.run.outputs.rc }}"
          exit 1

      - name: Assert TYPECHECK failure block
        env:
          OUTPUT: ${{ steps.run.outputs.out }}
        run: |
          if ! echo "$OUTPUT" | grep -q '### ❌ PRE-FLIGHT FAILURE: TYPECHECK'; then
            echo "::error::Output missing TYPECHECK failure block"
            exit 1
          fi
          echo "OK: TYPECHECK failure block present."

  # ---------------------------------------------------------------------------
  # Installer round-trip: install → verify files → run → uninstall → verify gone.
  # Runs on linux + mac so we catch any GNU vs BSD coreutils drift.
  # ---------------------------------------------------------------------------
  installer-smoke:
    name: Installer smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (project scope) from local clone
        run: bash install.sh --project --force

      - name: Verify install artifacts
        run: |
          test -f .claude/skills/pre-flight-check/SKILL.md
          test -x .claude/skills/pre-flight-check/scripts/run-pipeline.py
          echo "OK: skill files in place"

      - name: Run pipeline (expect UNKNOWN RUNTIME at repo root)
        id: run
        run: |
          set +e
          out="$(python3 .claude/skills/pre-flight-check/scripts/run-pipeline.py 2>&1)"
          rc=$?
          set -e
          echo "$out"
          echo "exit: $rc"
          # Repo root has no package.json/pyproject.toml at the top level →
          # detector returns UNKNOWN and exits 1. That's the expected state.
          if [ "$rc" != "1" ]; then
            echo "::error::Expected exit 1 (UNKNOWN RUNTIME), got $rc"
            exit 1
          fi
          if ! echo "$out" | grep -q 'PRE-FLIGHT SKIPPED: UNKNOWN RUNTIME'; then
            echo "::error::Output missing UNKNOWN RUNTIME skip block"
            exit 1
          fi
          echo "OK: pipeline ran, exited 1 with UNKNOWN RUNTIME as expected."

      - name: Uninstall and verify
        run: |
          bash install.sh --project --uninstall
          if [ -d .claude/skills/pre-flight-check ]; then
            echo "::error::Uninstall did not remove skill directory"
            exit 1
          fi
          echo "OK: uninstall removed skill directory."

  # ---------------------------------------------------------------------------
  # Multi-tool installer: deploy adapters for every supported tool, verify each
  # native rule/instruction file lands at its expected path, then uninstall and
  # verify nothing is left behind. Runs in a clean temp dir so it doesn't
  # pollute the workspace under test.
  # ---------------------------------------------------------------------------
  installer-multitool:
    name: Installer multi-tool round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install --tool all into a temp project
        run: |
          TMP=$(mktemp -d)
          echo "TMP=$TMP" >> "$GITHUB_ENV"
          (cd "$TMP" && bash "$GITHUB_WORKSPACE/install.sh" --tool all --project --force)

      - name: Verify every adapter file landed
        run: |
          expected=(
            ".claude/skills/pre-flight-check/SKILL.md"
            ".claude/skills/pre-flight-check/scripts/run-pipeline.py"
            "AGENTS.md"
            "GEMINI.md"
            "gemini-extension.json"
            ".cursor/rules/pre-flight-check.mdc"
            ".github/copilot-instructions.md"
            ".windsurf/rules/pre-flight-check.md"
            ".clinerules/pre-flight-check.md"
            ".kiro/steering/pre-flight-check.md"
            ".roo/rules/pre-flight-check.md"
            ".agents/skills/pre-flight-check/SKILL.md"
            ".pre-flight-check/scripts/run-pipeline.py"
          )
          missing=0
          for f in "${expected[@]}"; do
            if [ ! -e "$TMP/$f" ]; then
              echo "::error::Missing $f"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "$missing expected file(s) missing"
            exit 1
          fi
          echo "OK: all ${#expected[@]} adapter files present."

      - name: Reject --global for a non-Claude tool
        run: |
          (cd "$TMP" && bash "$GITHUB_WORKSPACE/install.sh" --tool cursor --global) 2>&1 | tee /tmp/out.txt
          if grep -q -- '--global is only supported for --tool claude' /tmp/out.txt; then
            echo "OK: installer rejected --global for cursor"
          else
            echo "::error::installer accepted --global for a non-Claude tool"
            exit 1
          fi

      - name: Uninstall --tool all and verify clean
        run: |
          (cd "$TMP" && bash "$GITHUB_WORKSPACE/install.sh" --tool all --project --uninstall)
          remaining=$(find "$TMP" -mindepth 1 -type f | wc -l)
          if [ "$remaining" -ne 0 ]; then
            echo "::error::$remaining file(s) left after uninstall:"
            find "$TMP" -mindepth 1 -type f
            exit 1
          fi
          echo "OK: uninstall left no files behind."
